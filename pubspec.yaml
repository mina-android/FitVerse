name: fitverse
description: FitVerse — AI-driven personal coaching ecosystem.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Auth
  google_sign_in: ^6.2.1

  # AI
  google_generative_ai: ^0.4.6

  # Health & Sensors
  health: ^12.0.0
  sensors_plus: ^4.0.2
  permission_handler: ^11.3.1

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.5

  # Local Storage
  shared_preferences: ^2.3.2

  # Charts
  fl_chart: ^0.68.0

  # HTTP
  http: ^1.2.2

  # UI Extras
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# ─── App Icon Configuration ───────────────────────────────────────────────────
# Run:  flutter pub get && dart run flutter_launcher_icons
# This generates all Android mipmap densities from assets/images/app_icon.png.
# The icon has a black background (#000000) with the FV logo centered (42/108 padding).
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 26
  remove_alpha_ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
