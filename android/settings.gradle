pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream {
            properties.load(it)
        }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"

    // AGP upgraded: 8.4.2 → 8.7.3 (Flutter requires >= 8.6.0)
    id "com.android.application" version "8.7.3" apply false

    // Kotlin upgraded: 1.9.24 → 2.1.21 (fixes kotlin-stdlib 2.2.x metadata incompatibility)
    id "org.jetbrains.kotlin.android" version "2.1.21" apply false

    // Google services — processes google-services.json → generates values.xml for Firebase
    id "com.google.gms.google-services" version "4.4.2" apply false
}

include ":app"
