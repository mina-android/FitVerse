{% extends 'users/base.html' %}
{% block title %}Account — FitVerse{% endblock %}

{% block content %}
<h2>👤 My Account</h2>
<p>{{ user.email }}</p>

<form method="POST">
  {% csrf_token %}

  <label>Age</label>
  {{ form.age }}

  <label>Height (cm)</label>
  {{ form.height }}

  <label>Weight (kg)</label>
  {{ form.weight }}

  <label>Workout Level</label>
  {{ form.workout_level }}

  <button type="submit">💾 Save Changes</button>
</form>


{% endblock %}
